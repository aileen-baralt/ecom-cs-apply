<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Customer Support Careers</title>

  <meta name="robots" content="noindex">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 40px 20px;
      font-family: Arial, sans-serif;
      background:
      radial-gradient(circle at top left, #1e293b, #0f172a 55%);
      color: white;
      min-height: 100vh;
    }

    .container {
      max-width: 760px;
      margin: auto;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px;
      padding: 50px;
      backdrop-filter: blur(16px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.35);
    }

    .badge {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.85);
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: 46px;
      line-height: 1.1;
      margin-bottom: 16px;
    }

    .subtitle {
      color: rgba(255,255,255,0.72);
      line-height: 1.7;
      font-size: 16px;
      margin-bottom: 38px;
    }

    label {
      display: block;
      margin-bottom: 10px;
      font-size: 15px;
      font-weight: bold;
      color: white;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(255,255,255,0.08);
      color: white;
      font-size: 15px;
      margin-bottom: 24px;
      outline: none;
      transition: 0.2s ease;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: rgba(255,255,255,0.25);
      background: rgba(255,255,255,0.11);
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(255,255,255,0.45);
    }

    select option {
      color: black;
    }

    textarea {
      resize: vertical;
    }

    .upload-box {
      padding: 18px;
      border-radius: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.15);
      margin-bottom: 24px;
    }

    button {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: 16px;
      background: white;
      color: black;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.95;
    }

    .footer {
      margin-top: 28px;
      text-align: center;
      color: rgba(255,255,255,0.45);
      font-size: 13px;
    }

    @media(max-width:768px) {

      body {
        padding: 20px 12px;
      }

      .container {
        padding: 28px;
      }

      h1 {
        font-size: 34px;
      }

    }
  </style>
</head>

<body>

  <div class="container">

    <div class="badge">
      Remote Position • Ecommerce Support
    </div>

    <h1>
      Join Our Customer Support Team
    </h1>

    <p class="subtitle">
      We work with fast-growing international ecommerce brands and are looking
      for motivated, professional, and reliable remote customer support agents
      to join our growing team.
    </p>

    <form action="https://formsubmit.co/aileen@acentecom.com" method="POST" enctype="multipart/form-data">

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Customer Support Application">
      <input type="hidden" name="_template" value="table">

      <label>Full Name</label>
      <input type="text" name="Full Name" placeholder="Your full name" required>

      <label>Email Address</label>
      <input type="email" name="Email Address" placeholder="you@example.com" required>

      <label>WhatsApp Number</label>
      <input type="text" name="WhatsApp Number" placeholder="+1 ..." required>

      <label>Country</label>
      <input type="text" name="Country" placeholder="Your country" required>

      <label>English Level</label>
      <select name="English Level" required>
        <option value="">Select your level</option>
        <option>Intermediate</option>
        <option>Advanced</option>
        <option>Fluent</option>
      </select>

      <label>Do you have ecommerce customer support experience?</label>
      <select name="Ecommerce Experience" required>
        <option value="">Select an option</option>
        <option>Yes</option>
        <option>No</option>
      </select>

      <label>Which platforms have you worked with?</label>
      <select name="Platforms Used" required>
        <option value="">Select an option</option>
        <option>Shopify</option>
        <option>Gorgias</option>
        <option>Zendesk</option>
        <option>Freshdesk</option>
        <option>None</option>
      </select>

      <label>Can you start within 3 days?</label>
      <select name="Start Within 3 Days" required>
        <option value="">Select an option</option>
        <option>Yes</option>
        <option>No</option>
      </select>

      <label>Paste Google Drive Link to Your Resume</label>
      <input type="text" name="Resume Link" placeholder="https://drive.google.com/...">

      <label>Attach Resume (PDF, DOC, DOCX)</label>

      <div class="upload-box">
        <input type="file" name="attachment" accept=".pdf,.doc,.docx">
      </div>

      <label>
        A customer says their package never arrived and is demanding
        a refund immediately. How would you respond?
      </label>

      <textarea
        name="Customer Scenario Response"
        rows="6"
        placeholder="Write your response here..."
      ></textarea>

      <button type="submit">
        Submit Application
      </button>

    </form>

    <div class="footer">
      Only shortlisted applicants will be contacted.
    </div>

  </div>

</body>
</html>
