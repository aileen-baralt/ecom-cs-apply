<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Ecom Customer Support Careers</title>

  <meta name="robots" content="noindex">

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f4f6f9;
      font-family: Arial, sans-serif;
      color: #222;
    }

    .container {
      max-width: 720px;
      margin: 50px auto;
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 36px;
      margin-bottom: 10px;
    }

    .subtitle {
      color: #666;
      line-height: 1.6;
      margin-bottom: 35px;
    }

    label {
      font-weight: bold;
      display: block;
      margin-bottom: 8px;
    }

    input,
    textarea,
    select {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      border: 1px solid #ccc;
      margin-bottom: 22px;
      font-size: 15px;
      box-sizing: border-box;
    }

    textarea {
      resize: vertical;
    }

    button {
      width: 100%;
      background: #000;
      color: white;
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }

    .footer-text {
      margin-top: 25px;
      font-size: 13px;
      color: #777;
      text-align: center;
    }

    @media (max-width: 768px) {
      .container {
        margin: 20px;
        padding: 25px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <h1>Join Our Customer Support Team</h1>

    <p class="subtitle">
      We work with international ecommerce brands and are looking for
      motivated, reliable, and professional customer support agents
      to join our growing remote team.
    </p>

    <form action="https://formsubmit.co/aileen@acentecom.com" method="POST">

      <input type="hidden" name="_captcha" value="false">
      <input type="hidden" name="_subject" value="New Customer Support Application">
      <input type="hidden" name="_template" value="table">

      <label>Full Name</label>
      <input type="text" name="Full Name" required>

      <label>Email Address</label>
      <input type="email" name="Email Address" required>

      <label>WhatsApp Number</label>
      <input type="text" name="WhatsApp Number" required>

      <label>Country</label>
      <input type="text" name="Country" required>

      <label>Timezone</label>
      <input type="text" name="Timezone" required>

      <label>English Level</label>
      <select name="English Level" required>
        <option value="">Select your level</option>
        <option>Basic</option>
        <option>Intermediate</option>
        <option>Advanced</option>
        <option>Fluent</option>
      </select>

      <label>Years of Customer Support Experience</label>
      <input type="text" name="Customer Support Experience">

      <label>Experience with Shopify, Gorgias, Zendesk or Ecommerce Platforms</label>
      <textarea name="Platform Experience" rows="4"></textarea>

      <label>Expected Monthly Salary (USD)</label>
      <input type="text" name="Expected Salary">

      <label>Availability / Preferred Shift</label>
      <input type="text" name="Availability">

      <label>Paste Google Drive Link to Your CV/Resume</label>
      <input type="text" name="Resume Link">

      <label>
        A customer says their package never arrived and is demanding
        a refund immediately. How would you respond?
      </label>

      <textarea name="Customer Scenario Response" rows="6"></textarea>

      <button type="submit">Submit Application</button>

    </form>

    <div class="footer-text">
      Only shortlisted applicants will be contacted.
    </div>

  </div>

</body>
</html>
